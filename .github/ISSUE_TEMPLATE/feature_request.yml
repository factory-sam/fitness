name: Feature Request
description: Suggest a new feature or improvement
labels: ["feature", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve, or what improvement does it enable?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this work? Include UI mockups, API shapes, or data model changes if relevant.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Dashboard
        - Workout Logger
        - Body Tracking
        - Supplements
        - Programme
        - Auth
        - API
        - Infrastructure
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why they were rejected.
