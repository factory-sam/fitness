name: Droid Auto Review

on:
  pull_request:
    types: [opened, ready_for_review, reopened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  droid-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup droid CLI
        run: |
          curl -fsSL https://app.factory.ai/cli | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Review PR
        env:
          FACTORY_API_KEY: ${{ secrets.FACTORY_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > /tmp/pr.diff

          cat /tmp/pr.diff | droid exec --auto high "
          You are reviewing PR #${PR_NUMBER} for the factory-sam/fitness repository.

          Review this diff for:
          1. Bugs: dead/unreachable code, null dereferences, off-by-one errors, async/await mistakes
          2. Security: SQL injection, XSS, hardcoded secrets, missing input validation
          3. Correctness: broken control flow, resource leaks, race conditions, missing error handling

          Skip stylistic concerns, minor optimizations, and architectural opinions.

          After your review, use the gh CLI to post your findings:

          If you find issues, post INLINE comments on the specific lines using:
            gh api repos/factory-sam/fitness/pulls/${PR_NUMBER}/reviews \\
              --method POST \\
              -f body='Review summary here' \\
              -f event='COMMENT' \\
              -f 'comments[][path]=file/path.ts' \\
              -f 'comments[][position]=LINE_IN_DIFF' \\
              -f 'comments[][body]=Issue description'

          If no issues found, approve the PR:
            gh api repos/factory-sam/fitness/pulls/${PR_NUMBER}/reviews \\
              --method POST \\
              -f body='Code review passed. No issues found.' \\
              -f event='APPROVE'
          "
